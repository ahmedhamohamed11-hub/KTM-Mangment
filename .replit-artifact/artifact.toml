kind = "web"
previewPath = "/"
title = "KTM – Kälte Technik Management"
version = "1.0.0"
id = "artifacts/ktm-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20816

[services.development]
run = "pnpm --filter @workspace/ktm-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ktm-app", "run", "build" ]
publicDir = "artifacts/ktm-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20816"
BASE_PATH = "/"
